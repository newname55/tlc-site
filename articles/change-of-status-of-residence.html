          <h1>在留資格変更とは</h1>
          <p>日本での活動内容が変わるとき、在留資格変更許可申請が必要になることがあります。仕事の内容や立場が変わる場合は、早めの確認が大切です。</p>
        </div>
      </div>

      <div class="container">

            <h2>どんなときに考えるか</h2>
            <p>留学から就労、家族滞在から就労など、現在の在留資格とこれからの活動内容が一致しない場合に検討されます。</p>
          </article>
          <article class="detail-card">
            <h2>確認したいポイント</h2>
            <p>仕事内容、雇用条件、会社資料などが実際の活動と整合しているかを整理することが重要です。</p>
          </article>
